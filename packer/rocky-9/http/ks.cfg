#version=RHEL9
text
reboot

url --url="https://download.rockylinux.org/pub/rocky/9/BaseOS/x86_64/os/"
lang en_US.UTF-8
keyboard us
timezone UTC --utc

network --bootproto=dhcp --device=link --activate --onboot=on

# Password hash for "packer" — build-time only account, replaced/removed by
# the shell provisioner before the template is finalized. Regenerate with:
# python3 -c "import crypt; print(crypt.crypt('packer', crypt.mksalt(crypt.METHOD_SHA512)))"
rootpw --lock
user --name=ansible --groups=wheel --password=$6$1XLdNihuOPgEJ.4h$vNi26cKU0GVlqpa5.jwa8C5j/c0k7/ZHEOUepr0sSb4CdWFSnWud2GGi4nGyZ4/IuyNwE3y3o6fdTfs5REdjc1 --iscrypted

# Public half of files/ansible_build_key — regenerate both with
# `ssh-keygen -t ed25519 -N "" -f files/ansible_build_key` and paste the
# resulting files/ansible_build_key.pub contents in below. See README.
sshkey --username=ansible "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIB2vQRB/0PTqwi4//CQRQ+csQUdDXQz7WGKisR5J2ZZN vm-templates rocky-9 packer build (throwaway, build-time only)"

bootloader --location=mbr
zerombr
clearpart --all --initlabel
autopart --type=lvm

selinux --enforcing
firewall --enabled --service=ssh

%packages
@^minimal-environment
qemu-guest-agent
openssh-server
%end

%post
echo 'ansible ALL=(ALL) NOPASSWD:ALL' > /etc/sudoers.d/ansible
chmod 0440 /etc/sudoers.d/ansible
systemctl enable qemu-guest-agent
systemctl enable sshd
%end
